<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Calculator</title>


<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}


body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:

radial-gradient(
circle,
#475569,
#020617
);

}



/* CALCULATOR */

.calculator{

width:380px;

padding:25px;

border-radius:30px;

background:

linear-gradient(
145deg,
#1e293b,
#020617
);


box-shadow:

0 25px 60px rgba(0,0,0,.7);

}



/* TITLE */

.title{

color:white;

text-align:center;

font-size:25px;

margin-bottom:20px;

}



/* DISPLAY */

.display{

width:100%;

height:80px;

padding:15px;

border:none;

outline:none;

border-radius:18px;

font-size:32px;

text-align:right;

color:white;

background:#020617;


box-shadow:

inset 5px 5px 15px black;

}



/* HISTORY */


.history-box{

margin:15px 0;

}



.history-header{

display:flex;

justify-content:space-between;

align-items:center;

color:white;

margin-bottom:8px;

}



.history-header button{

padding:5px 12px;

font-size:12px;

border:none;

border-radius:15px;

cursor:pointer;

color:white;

background:#ef4444;

}



.history{

height:70px;

overflow-y:auto;

padding:10px;

border-radius:12px;

background:

rgba(255,255,255,.08);

color:#cbd5e1;

font-size:14px;

}



.history p{

margin:5px 0;

padding-bottom:5px;

border-bottom:

1px solid rgba(255,255,255,.1);

}



/* BUTTONS */


.buttons{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:12px;

}



button{

height:60px;

border:none;

border-radius:15px;

font-size:22px;

font-weight:bold;

cursor:pointer;

color:white;


background:

linear-gradient(
145deg,
#334155,
#1e293b
);


box-shadow:

4px 4px 8px #020617,

-2px -2px 5px rgba(255,255,255,.1);


transition:.2s;

}



button:hover{

filter:brightness(1.2);

}


button:active{

transform:scale(.92);

}



/* BUTTON COLORS */


.operator{

background:

linear-gradient(
145deg,
#f97316,
#c2410c
);

}


.clear{

background:

linear-gradient(
145deg,
#ef4444,
#991b1b
);

.clear:hover{

background:
linear-gradient(
145deg,
#ff6666,
#dc2626
);


}


.equal{

grid-column:span 2;


background:

linear-gradient(
145deg,
#22c55e,
#15803d
);

}



/* MOBILE */

@media(max-width:420px){

.calculator{

width:95%;

}

}

</style>

</head>



<body>


<div class="calculator">


<div class="title">
🧮 Calculator
</div>



<input 
id="display"
class="display"
readonly
>



<div class="history-box">


<div class="history-header">

<span>
History
</span>


<button onclick="clearHistory()">
Clear
</button>


</div>



<div 
class="history"
id="history">
</div>


</div>





<div class="buttons">


<button class="clear" onclick="clearDisplay()">
C
</button>


<button onclick="deleteLast()">
⌫
</button>


<button onclick="percentage()">
%
</button>


<button class="operator" onclick="press('/')">
÷
</button>




<button onclick="press('7')">
7
</button>

<button onclick="press('8')">
8
</button>

<button onclick="press('9')">
9
</button>

<button class="operator" onclick="press('*')">
×
</button>




<button onclick="press('4')">
4
</button>

<button onclick="press('5')">
5
</button>

<button onclick="press('6')">
6
</button>

<button class="operator" onclick="press('-')">
−
</button>




<button onclick="press('1')">
1
</button>

<button onclick="press('2')">
2
</button>

<button onclick="press('3')">
3
</button>

<button class="operator" onclick="press('+')">
+
</button>




<button onclick="press('0')">
0
</button>

<button onclick="press('.')">
.
</button>

<button class="equal" onclick="calculate()">
=
</button>



</div>


</div>





<script>


const display =
document.getElementById("display");


const history =
document.getElementById("history");




function press(value){

display.value += value;

}




function clearDisplay(){

display.value="";

}




function deleteLast(){

display.value =
display.value.slice(0,-1);

}




function percentage(){

if(display.value){

display.value =
Number(display.value)/100;

}

}




function calculate(){


if(display.value==="") return;



try{


let expression =
display.value;


let result =
eval(expression);



let item=document.createElement("p");


item.textContent =
expression+" = "+result;


history.prepend(item);



display.value=result;


}

catch{


display.value="Error";


setTimeout(()=>{

display.value="";

},1000);


}


}





function clearHistory(){

history.innerHTML="";

}





document.addEventListener(
"keydown",
function(e){



if(
(e.key>="0" &&
e.key<="9")
||
["+","-","*","/","."].includes(e.key)

){

press(e.key);

}



else if(e.key==="Enter"){

calculate();

}



else if(e.key==="Backspace"){

deleteLast();

}



else if(e.key==="Escape"){

clearDisplay();

}



});


</script>


</body>

</html>
